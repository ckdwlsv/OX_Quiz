<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="card shadow-sm mx-auto" style="max-width: 500px;">
        <div class="card-header fw-bold">
            회원가입
        </div>
        <div class="card-body">
          <form th:action="@{/member/join}" th:object="${dto}"
                method="post" onsubmit="return checkPassword();">
              <div class="mb-3">
                  <label class="form-label">아이디</label>
                  <input type="text" th:field="*{id}" class="form-control" required>
              </div>
              <div class="mb-3">
                  <label class="form-label">비밀번호</label>
                  <input type="password" th:field="*{password}" class="form-control" required>
              </div>
              <div class="mb-3">
                  <label class="form-label">비밀번호 확인</label>
                  <input type="password" id="passwordCheck" class="form-control" required>
              </div>
              <div id="passwordMessage" class="mb-3 text-danger fw-bold">
              </div>
		          <div th:if="${message != null}" class="alert alert-danger">
		              <span th:text="${message}">
		                아이디
		              </span>
		          </div>
              <button type="submit" class="btn btn-primary w-100">
                  회원가입
              </button>
          </form>
          <div class="text-center mt-3">
              <a href="/member/login">이미 계정이 있나요? 로그인</a>
          </div>
        </div>
    </div>
</div>
<script>
	function checkPassword() {
		const password =
				document.getElementById("password").value;
		const passwordCheck =
				document.getElementById("passwordCheck").value;
		const message =
				document.getElementById("passwordMessage");
		if (password !== passwordCheck) {
			message.textContent =
					"비밀번호가 일치하지 않습니다.";
			return false;
		}
		return true;
	}
</script>
</body>
</html>
