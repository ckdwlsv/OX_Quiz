<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OX 퀴즈 게임</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-body text-center p-5">
            <h1 class="fw-bold mb-5">
                OX 퀴즈 게임
            </h1>
            <div>
                <h3 class="text-danger mb-4">
                    등록된 문제가 없습니다.
                </h3>
                <a href="/quiz" class="btn btn-secondary">
                    퀴즈 메인 화면으로 돌아가기
                </a>
            </div>
            <div>
                <h3 class="mb-4">
                    퀴즈
                </h3>
                <div class="alert alert-light border mb-5">
                    <h4>달팽이도 이빨이 있다. - 문제출력</h4>
                </div>
                <form action="/quiz/check" method="post">
                    <button type="submit" name="userAnswer"
                            value="true" class="btn btn-primary btn-lg me-3">
                        O
                    </button>
                    <button type="submit" name="userAnswer"
                            value="false" class="btn btn-danger btn-lg">
                        X
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
