<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OX Quiz Application</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <!-- 상단 메뉴 -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1 class="fw-bold mb-0">
            OX Quiz Application
        </h1>

        <div class="d-flex align-items-center gap-2">

            <!-- 로그인 상태 -->
            <div class="d-flex align-items-center gap-2">

                <span class="fw-bold text-primary">
                    <span>유저이름</span> 님
                </span>

                <a href="/admin/members"
                        class="btn btn-dark btn-sm">
                    회원관리
                </a>

                <a href="/member/logout"
                        class="btn btn-outline-danger btn-sm">
                    로그아웃
                </a>

            </div>

            <!-- 비로그인 상태 -->
            <div class="d-flex gap-2">
                <a
                        href="/member/login"
                        class="btn btn-outline-primary btn-sm">
                    로그인
                </a>

                <a
                        href="/member/join"
                        class="btn btn-primary btn-sm">
                    회원가입
                </a>

            </div>

        </div>
    </div>

    <!-- 등록 폼 -->
    <div class="card shadow-sm mb-5">
        <div class="card-header fw-bold">
            퀴즈 등록
        </div>

        <div class="card-body">
            <form action="/quiz/insert" method="post">

                <div class="mb-3">
                    <label class="form-label">퀴즈 내용</label>
                    <textarea
                            name="content"
                            rows="5"
                            class="form-control"
                            placeholder="OX 퀴즈 내용을 입력하세요."></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label d-block">퀴즈 정답</label>

                    <div class="form-check form-check-inline">
                        <input
                                class="form-check-input"
                                type="radio"
                                id="answerTrue"
                                name="answer"
                                value="true"
                                checked>
                        <label class="form-check-label" for="answerTrue">
                            O
                        </label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input
                                class="form-check-input"
                                type="radio"
                                id="answerFalse"
                                name="answer"
                                value="false">
                        <label class="form-check-label" for="answerFalse">
                            X
                        </label>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">작성자</label>
                    <input
                            type="text"
                            name="writer"
                            class="form-control"
                            placeholder="작성자를 입력하세요.">
                </div>

                <button
                        type="submit"
                        class="btn btn-primary">
                    등록하기
                </button>

            </form>
        </div>
    </div>

    <!-- 목록 상단 -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="fw-bold mb-0">
            등록된 퀴즈 목록
        </h2>

        <a
                href="/quiz/play"
                class="btn btn-success">
            퀴즈 플레이
        </a>
    </div>

    <!-- 퀴즈 목록 -->
    <table class="table table-bordered table-hover align-middle">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>내용</th>
            <th>해답</th>
            <th>작성자</th>
            <th>변경</th>
            <th>삭제</th>
        </tr>
        </thead>

        <tbody>
        <tr>

            <td>1</td>

            <td>
                달팽이도 이빨이 있다.
            </td>

            <td>
                <span class="badge bg-primary">
                    O
                </span>

                <span class="badge bg-danger">
                    X
                </span>
            </td>

            <td>
                홍길동
            </td>

            <td>
                <a
                        th:href="@{/quiz/{id}(id=${quiz.id})}"
                        class="btn btn-warning btn-sm">
                    수정
                </a>
            </td>

            <td>
                <form
                        action="/quiz/delete"
                        method="post"
                        onsubmit="return confirm('정말 삭제하시겠습니까?');">

                    <button
                            type="submit"
                            class="btn btn-danger btn-sm">
                        삭제
                    </button>

                </form>
            </td>

        </tr>
        </tbody>
    </table>

    <!-- 퀴즈가 없을 때 -->
    <div class="alert alert-secondary text-center">
        등록된 퀴즈가 없습니다.
    </div>

</div>

</body>
</html>
